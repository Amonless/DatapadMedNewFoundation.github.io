<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медицинский Терминал ВАР | New Foundation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');

        :root {
            --terminal-bg: #0f172a;
            --terminal-surface: #1e293b;
            --terminal-accent: #3b82f6;
            --terminal-text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--terminal-bg);
            color: var(--terminal-text);
        }

        .mono { font-family: 'JetBrains+Mono', monospace; }

        .chart-container { 
            position: relative; 
            width: 100%; 
            max-width: 420px; 
            margin-left: auto; 
            margin-right: auto; 
            height: 300px; 
        }

        .tab-btn.active {
            border-bottom: 3px solid var(--terminal-accent);
            color: var(--terminal-accent);
            background: rgba(59, 130, 246, 0.1);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .step-node {
            position: relative;
            padding-left: 2rem;
        }
        .step-node::before {
            content: '';
            position: absolute;
            left: 0.75rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #334155;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(59, 130, 246, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-12 overflow-x-hidden">

    <div class="scanline"></div>

    <header class="glass-panel sticky top-0 z-50 border-b border-slate-700">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between px-6 py-3">
            <div class="flex items-center gap-3 mb-4 md:mb-0">
                <div class="w-10 h-10 bg-blue-600 rounded flex items-center justify-center font-bold text-xl shadow-lg shadow-blue-900/20">✚</div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight uppercase mono">MED-TERMINAL v4.5</h1>
                    <p class="text-[10px] text-blue-400 font-bold tracking-[0.2em]">REPUBLIC MEDICAL CORPS // NEW FOUNDATION</p>
                </div>
            </div>
            <nav class="flex flex-wrap justify-center gap-1" id="main-nav"></nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 mt-8">
        
        <section id="sec-dashboard" class="content-section fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 glass-panel p-6 rounded-xl">
                    <h3 class="text-sm font-bold text-slate-400 mb-6 uppercase tracking-widest mono">Сортировочный Центр</h3>
                    <div class="chart-container">
                        <canvas id="triageChart"></canvas>
                    </div>
                    <div class="mt-6 space-y-2" id="triage-legend"></div>
                </div>

                <div class="lg:col-span-2 glass-panel p-6 rounded-xl flex flex-col">
                    <div id="triage-header" class="flex items-center gap-4 mb-6 border-b border-slate-700 pb-4">
                        <div id="triage-status-dot" class="w-4 h-4 rounded-full bg-slate-600"></div>
                        <h2 id="triage-title" class="text-2xl font-bold uppercase mono italic">Ожидание выбора...</h2>
                    </div>
                    <div id="triage-content" class="flex-grow space-y-6">
                        <div class="flex flex-col items-center justify-center h-full text-slate-500 italic py-12">
                            <p>Выберите категорию для просмотра протокола.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-personnel" class="content-section fade-in hidden">
            <div class="mb-8">
                <h2 class="text-3xl font-bold mono mb-2 uppercase italic text-blue-500">Медицинская Иерархия</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="personnel-grid"></div>
        </section>

        <section id="sec-surgery" class="content-section fade-in hidden">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-1 space-y-2" id="surgery-menu"></div>
                <div class="md:col-span-3 glass-panel p-8 rounded-xl min-h-[500px]" id="surgery-viewer">
                    <div class="flex flex-col items-center justify-center h-full opacity-30 italic">ВЫБЕРИТЕ ПРОТОКОЛ ОПЕРАЦИИ</div>
                </div>
            </div>
        </section>

        <section id="sec-pharma" class="content-section fade-in hidden">
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                <div class="xl:col-span-2">
                    <h2 class="text-2xl font-bold mono uppercase italic mb-6">Фармакопея</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="pharma-grid"></div>
                </div>
                <div class="xl:col-span-1">
                    <h2 class="text-2xl font-bold mono uppercase italic mb-6 border-b border-red-900 pb-2 text-red-500">Боевые Бинды</h2>
                    <div class="glass-panel p-6 rounded-xl space-y-4" id="binds-list"></div>
                </div>
            </div>
        </section>

        <section id="sec-protocols" class="content-section fade-in hidden">
            <div class="max-w-3xl mx-auto glass-panel p-10 rounded-2xl border-t-4 border-blue-600">
                <h2 class="text-center text-3xl font-bold mono mb-8 uppercase">Устав Медика</h2>
                <div class="space-y-6 text-slate-300" id="charter-text"></div>
            </div>
        </section>
    </main>

    <script>
        const PERSONNEL_DATA = [
            { 
                rank: 'Интерн', 
                color: 'slate', 
                duties: [
                    'Проведение сканирования', 
                    'Лечение ожогов 1-3 степени', 
                    'Лечение переломов без глубокого внедрения', 
                    'Изучение документов', 
                    'Наблюдение за работой капралов', 
                    'Работа за регистратурой'
                ] 
            },
            { 
                rank: 'Младший специалист', 
                color: 'blue', 
                duties: [
                    'Обязанности интерна', 
                    'Лечение ожога 4 степени (без ампутации)', 
                    'Хирургическое лечение переломов', 
                    'Обучение интернов основам'
                ] 
            },
            { 
                rank: 'Старший специалист', 
                color: 'cyan', 
                duties: [
                    'Обязанности мл. специалиста', 
                    'Координация персонала на вылетах', 
                    'Лечение ожога 4 степени с ампутацией', 
                    'Сложные переломы с подтипами', 
                    'Обучение мед. братьев'
                ] 
            }
        ];

        const SURGERY_DATA = [
            {
                id: 'foundation',
                title: 'Фундамент любой операции',
                content: `
                    <ul class="space-y-2 list-disc pl-5">
                        <li>Подключить бойца к системе "Жизнеобеспечения"</li>
                        <li>Ввести в наркозный сон или обезболить</li>
                        <li>Запустить систему циркуляции крови (при кровотечении)</li>
                        <li>Надеть перчатки</li>
                    </ul>
                `
            },
            {
                id: 'prosthetics',
                title: 'Репли-протезирование',
                content: `
                    <div class="space-y-4">
                        <p><strong>Для Клона:</strong> Взять синтеплоть, покрыть протез и КСНИ, обработать бактой.</p>
                        <p><strong>Для Других:</strong> Взять образец кожи/плоти, изготовить синтеплоть на синтезаторе.</p>
                        <div class="p-3 bg-blue-900/20 border-l-4 border-blue-500">
                            <strong>Этап КСНИ:</strong> Изготовить интерфейс, подключить к нервам и контактам каркаса, врастить с бактой и виброскальпелем.
                        </div>
                    </div>
                `
            },
            {
                id: 'vascular',
                title: 'Сосудистая хирургия',
                content: `
                    <div class="p-4 border border-blue-500/30 rounded bg-slate-800">
                        <h4 class="font-bold mb-2">Устранение кровотечения (/roll):</h4>
                        <p><strong>&lt; 50:</strong> Сшивание оборванного сосуда</p>
                        <p><strong>&gt; 50:</strong> Обработка коагулянтом</p>
                    </div>
                `
            },
            {
                id: 'skull',
                title: 'Декомпрессия черепа',
                content: `
                    <p class="mb-2 italic text-red-400">Требуется при боли в голове (на сканере /roll < 25)</p>
                    <ol class="list-decimal pl-5 space-y-2">
                        <li>Лазером вырезать кость черепа (5-угольная фигура: /me 1/5...5/5)</li>
                        <li>Пинцетом убрать кость</li>
                        <li>Дождаться снижения давления на аппаратуре</li>
                        <li>Обработать костоправом и вернуть кость</li>
                    </ol>
                `
            },
            {
                id: 'pneumothorax',
                title: 'Пневмоторакс',
                content: `
                    <div class="space-y-4">
                        <p><strong>Закрытый (roll 71-100):</strong> Вентилирование легкого.</p>
                        <p><strong>Открытый (roll 31-70):</strong> Ушивание дырки, удаление осколков, вентиляция.</p>
                        <p><strong>Клапанный (roll < 30):</strong> Перевод в открытый, сшивание раны, вентиляция.</p>
                    </div>
                `
            },
            {
                id: 'fractures_adv',
                title: 'Сложные переломы',
                content: `
                    <div class="space-y-4 text-sm">
                        <p><strong>Ребра:</strong> При осложнениях — дренирование (трубка во 2-м межреберье), удаление крови/воздуха.</p>
                        <p><strong>Шея:</strong> При осколках — удаление, ушивание сосудов/нервов (Хромостринг), замена позвонка имплантом.</p>
                        <p><strong>Поясница:</strong> Лазерный разрез, очистка от осколков, фиксация пластинами и болтами.</p>
                    </div>
                `
            }
        ];

        const PHARMA_DATA = [
            { name: 'Ситрим (спрей)', desc: 'Остановка кровотечения (свертывание).' },
            { name: 'Крайн (паста)', desc: 'Сращивание костей. Вводить через Хромостринг.' },
            { name: 'Хромостринг', desc: 'Препарат для глубокого проникновения без вреда сосудам.' },
            { name: 'Антишок', desc: 'При повреждениях головы и психическом шоке.' },
            { name: 'Ниинсанирин', desc: 'Лечение "Безумия клона".' },
            { name: 'Дермсил / Герметик', desc: 'Запечатывание тяжелых ранений и защита от инфекций.' },
            { name: 'Квиквейк', desc: 'Приведение в сознание (приложить к носу).' },
            { name: 'Бакта-пилюля', desc: 'Заживление внутренних органов.' },
            { name: 'ПСП (стим)', desc: 'Снижение давления, температуры и пульса.' }
        ];

        const BINDS_DATA = [
            { cmd: '/me за руку оттащил бойца', key: 'BIND *' },
            { cmd: '/me сделал разряд дефибриллятором', key: 'BIND *' },
            { cmd: '/me распылил бактогаз', key: 'BIND *' }
        ];

        const CHARTER_RULES = [
            'Оказывать помощь независимо от ранга и личных отношений.',
            'Соблюдать строгую дисциплину.',
            'Оказывать помощь по степени необходимости (Триаж).',
            'Не покидать пост без разрешения.',
            'Соблюдать врачебную тайну.',
            'Уметь обращаться с вооружением и мед. оборудованием.',
            'Не выпрашивать повышения.',
            'Не хамить и не грубить пациентам.',
            'Спасти жизнь пациента любой ценой.',
            'Не причинять вред пациенту.',
            'Не проводить операции без должной специализации.'
        ];

        function init() {
            renderNav();
            renderPersonnel();
            renderSurgeryMenu();
            renderPharma();
            renderBinds();
            renderCharter();
            switchTab('dashboard');
        }

        function renderNav() {
            const nav = document.getElementById('main-nav');
            const items = [
                { id: 'dashboard', label: '📊 Сводка' },
                { id: 'personnel', label: '🪖 Состав' },
                { id: 'surgery', label: '🩻 Хирургия' },
                { id: 'pharma', label: '💊 Фарма/Бинды' },
                { id: 'protocols', label: '📜 Устав' }
            ];
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn px-4 py-2 text-xs font-bold uppercase tracking-wider transition-all hover:text-blue-400';
                btn.innerText = item.label;
                btn.onclick = () => switchTab(item.id);
                btn.id = `btn-${item.id}`;
                nav.appendChild(btn);
            });
        }

        function switchTab(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`sec-${id}`).classList.remove('hidden');
            document.getElementById(`btn-${id}`).classList.add('active');
        }

        function renderPersonnel() {
            const grid = document.getElementById('personnel-grid');
            PERSONNEL_DATA.forEach(p => {
                const card = document.createElement('div');
                card.className = `glass-panel p-6 rounded-xl border-t-4 border-${p.color}-500`;
                card.innerHTML = `
                    <h3 class="text-xl font-bold mb-4 uppercase text-${p.color}-400">${p.rank}</h3>
                    <ul class="space-y-2 text-sm text-slate-300">
                        ${p.duties.map(d => `<li class="flex gap-2"><span>•</span>${d}</li>`).join('')}
                    </ul>
                `;
                grid.appendChild(card);
            });
        }

        function renderSurgeryMenu() {
            const menu = document.getElementById('surgery-menu');
            SURGERY_DATA.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-4 py-3 glass-panel hover:bg-blue-600/20 transition-all text-xs font-bold uppercase mono border-l-2 border-transparent hover:border-blue-500';
                btn.innerText = s.title;
                btn.onclick = () => {
                    document.getElementById('surgery-viewer').innerHTML = `
                        <h2 class="text-2xl font-bold mb-6 text-blue-400 mono uppercase italic">${s.title}</h2>
                        <div class="space-y-4 text-slate-200">${s.content}</div>
                    `;
                };
                menu.appendChild(btn);
            });
        }

        function renderPharma() {
            const grid = document.getElementById('pharma-grid');
            PHARMA_DATA.forEach(p => {
                const div = document.createElement('div');
                div.className = 'p-4 bg-slate-800/50 border border-slate-700 rounded-lg';
                div.innerHTML = `<div class="font-bold text-blue-400 text-sm mb-1 uppercase">${p.name}</div><div class="text-xs text-slate-400">${p.desc}</div>`;
                grid.appendChild(div);
            });
        }

        function renderBinds() {
            const list = document.getElementById('binds-list');
            BINDS_DATA.forEach(b => {
                const div = document.createElement('div');
                div.className = 'p-3 bg-red-900/10 border border-red-500/20 rounded flex justify-between items-center';
                div.innerHTML = `<span class="text-xs mono">${b.cmd}</span><span class="text-[10px] bg-red-500 px-2 py-1 rounded font-bold">${b.key}</span>`;
                list.appendChild(div);
            });
        }

        function renderCharter() {
            const container = document.getElementById('charter-text');
            CHARTER_RULES.forEach((rule, idx) => {
                const p = document.createElement('p');
                p.className = 'flex items-baseline gap-4 text-sm';
                p.innerHTML = `<span class="mono font-bold text-blue-500">${String(idx+1).padStart(2, '0')}.</span> <span>${rule}</span>`;
                container.appendChild(p);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
